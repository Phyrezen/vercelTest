<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agute - Señor del Magic</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: #e2e8f0;
        overflow-x: hidden;
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
      }

      header {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      h1 {
        font-family: 'Orbitron', sans-serif;
        font-size: 4rem;
        background: linear-gradient(90deg, #38bdf8, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: glow 2s infinite alternate;
      }

      @keyframes glow {
        from { text-shadow: 0 0 10px #38bdf8; }
        to { text-shadow: 0 0 25px #a78bfa; }
      }

      .subtitle {
        margin-top: 20px;
        opacity: 0.8;
      }

      /* Imagen */
      .agute-wrapper {
        position: relative;
        margin-top: 30px;
      }

      .agute-img {
        width: 250px;
        border-radius: 20px;
        transition: 0.4s;
        box-shadow: 0 0 20px rgba(56,189,248,0.6);
      }

      .agute-img:hover {
        transform: scale(1.1);
        box-shadow: 0 0 60px rgba(167,139,250,0.8);
      }

      /* Gatito */
      .cat {
        position: fixed;
        top: 20px;
        right: 20px;
        font-size: 40px;
        animation: floatCat 3s infinite;
      }

      @keyframes floatCat {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      /* Botón */
      .btn {
        margin-top: 30px;
        padding: 12px 30px;
        border-radius: 999px;
        border: none;
        background: linear-gradient(90deg, #38bdf8, #a78bfa);
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      .btn:hover {
        transform: scale(1.1);
      }

      /* Cartas */
      .card-particle {
        position: fixed;
        width: 60px;
        height: 90px;
        background-size: cover;
        background-position: center;
        z-index: 999;
        pointer-events: none;
        animation: explode 1.5s forwards;
      }

      @keyframes explode {
        from {
          opacity: 1;
          transform: scale(0.5);
        }
        to {
          opacity: 0;
          transform: translate(var(--x), var(--y)) rotate(var(--rot)) scale(1.2);
        }
      }

      section {
        padding: 80px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <canvas id="bg"></canvas>

    <div class="cat">🐱</div>

    <header>
      <h1>AGUTE</h1>
      <p class="subtitle">Señor del Magic • Arquitecto del Caos</p>

      <div class="agute-wrapper">
        <img src="/imagen-agute.png" class="agute-img" />
      </div>

      <button class="btn" onclick="honrarMaestro()">Honrar al Maestro</button>
    </header>

    <section id="about">
      <h2>¿Quién es Agute?</h2>
      <p>No es solo un jugador. Es destino puro.</p>
    </section>

    <script>
      function honrarMaestro() {
        document.getElementById('about').scrollIntoView({ behavior: 'smooth' });
        lanzarCartas();
      }

      function lanzarCartas() {
        const cartas = [
          '/cards/blue-eyes.jpg',
          '/cards/dark-magician.jpg',
          '/cards/exodia.jpg'
        ];

        for (let i = 0; i < 30; i++) {
          const c = document.createElement('div');
          c.className = 'card-particle';

          c.style.backgroundImage = `url(${cartas[Math.floor(Math.random()*cartas.length)]})`;

          c.style.left = window.innerWidth / 2 + 'px';
          c.style.top = window.innerHeight / 2 + 'px';

          c.style.setProperty('--x', (Math.random() - 0.5) * 1000 + 'px');
          c.style.setProperty('--y', (Math.random() - 0.5) * 800 + 'px');
          c.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');

          document.body.appendChild(c);

          setTimeout(() => c.remove(), 1500);
        }
      }

      // partículas fondo
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let particles = Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
      }));

      function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle = '#38bdf8';
          ctx.fill();

          p.x += p.dx;
          p.y += p.dy;

          if (p.x<0||p.x>canvas.width) p.dx*=-1;
          if (p.y<0||p.y>canvas.height) p.dy*=-1;
        });
        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
